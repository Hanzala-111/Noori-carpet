    <!-- CUSTOM CARPET -->
    <section class="custom-carpet">

        <h1 data-aos="fade-up">Design Your Carpet</h1>

        <form id="customForm">

            <input type="text" name="name" placeholder="Your Name" required>

            <input type="email" name="email" placeholder="Email" required>

            <!-- REQUIRED by your backend -->
            <input type="text" name="phone" placeholder="Phone Number" required>

            <!-- REQUIRED by your backend -->
            <input type="text" name="design" placeholder="Design Type (e.g. Modern, Classic)" required>

            <select name="size" required>
                <option value="Small">Small</option>
                <option value="Medium">Medium</option>
                <option value="Large">Large</option>
            </select>

            <textarea name="message" placeholder="Describe your carpet" required></textarea>

            <button class="btn" type="submit">Request Quote</button>

        </form>

    </section>
